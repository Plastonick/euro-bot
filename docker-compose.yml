services:
  backend:
    build:
      - context: .
      - dockerfile: php.Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - .:/code
    depends_on:
      - db
  frontend:
    image: ${FRONTEND}
    ports:
      - "80:80"
    depends_on:
      - db
  db:
    image: postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: example
