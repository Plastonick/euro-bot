services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: sweepstake
      POSTGRES_USER: sweepstake
      POSTGRES_PASSWORD: sweepstake
    ports:
      - "5444:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sweepstake -d sweepstake"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    build:
      context: ./backend
      dockerfile: php.Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sweepstake
      DB_USER: sweepstake
      DB_PASS: sweepstake
    entrypoint: ["vendor/bin/phinx"]
    command: ["migrate"]
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: php.Dockerfile
    ports:
      - "8090:80"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sweepstake
      DB_USER: sweepstake
      DB_PASS: sweepstake
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SWEEPSTAKES_API: http://127.0.0.1:8090
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
